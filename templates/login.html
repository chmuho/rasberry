<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>관리자 로그인 | 스마트 도어락</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 
    body {
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      background: #ffffff;
      color: #111111;
    }
 
    .page {
      width: min(430px, 100%);
      margin: 0 auto;
      padding: 60px 28px 48px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    /* TITLE */
    .title {
      font-size: 32px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.02em;
      margin-bottom: 36px;
      line-height: 1.2;
    }
 
    /* FORM */
    .form { display: flex; flex-direction: column; gap: 20px; }
 
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label {
      font-size: 14px;
      font-weight: 600;
      color: #111;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 14px;
      padding: 16px 18px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      color: #111;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-wrap input::placeholder { color: #b0b0b0; font-weight: 400; }
    .input-wrap input:focus { border-color: #111; }
    .input-wrap input::-ms-reveal,
    .input-wrap input::-ms-clear {
      display: none;
    }
    .input-wrap input::-webkit-credentials-auto-fill-button {
      visibility: hidden;
      display: none !important;
      pointer-events: none;
    }
    .input-wrap input[type="password"], .input-wrap input[type="text"]#password { padding-right: 52px; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; background: transparent; border: none; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center; color: #777;
    }
    .eye-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
    .eye-btn.active { color: #111; }
 
    /* SIGN IN BTN */
    .signup-btn {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 18px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .signup-btn:active { opacity: 0.85; transform: scale(0.98); }
    .notice { display: none; margin-top: 18px; padding: 14px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .notice.error { display: block; background: #FFF1F1; color: #B34040; border: 1px solid #F5D0D0; }
  </style>
</head>
<body>
<div class="page">
 
  <!-- TITLE -->
  <h1 class="title">관리자 로그인</h1>
 
  <div class="form">
 
    <!-- 아이디 -->
    <div class="field">
      <label for="username">아이디</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="아이디를 입력하세요" />
      </div>
    </div>
 
    <!-- 비밀번호 -->
    <div class="field">
      <label for="password">비밀번호</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" />
        <button class="eye-btn" id="togglePwBtn" type="button" onclick="togglePw()" aria-label="비밀번호 보기">
          <svg id="eyeIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/>
            <circle cx="12" cy="12" r="2.7"/>
          </svg>
        </button>
      </div>
    </div>
 
    <div style="display: flex; align-items: center; justify-content: flex-end; gap: 14px;">
      <a href="/find-id" style="font-size: 13px; font-weight: 600; color: #111; text-decoration: none;">아이디 찾기</a>
      <span style="font-size: 12px; color: #ddd;">|</span>
      <a href="/forgot-password" style="font-size: 13px; font-weight: 600; color: #111; text-decoration: none;">비밀번호 찾기</a>
    </div>
 
    <!-- 로그인 버튼 -->
    <button class="signup-btn" type="button" onclick="submitLogin()">로그인</button>
    <div id="notice" class="notice"></div>
 
  </div>
 
</div>
 
<script>
  let pwVisible = false;

  function showNotice(message) {
    const notice = document.getElementById('notice');
    notice.textContent = message;
    notice.className = 'notice error';
  }

  ['username', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', event => {
      if (event.key === 'Enter') submitLogin();
    });
  });

  function togglePw() {
    pwVisible = !pwVisible;
    const input = document.getElementById('password');
    const btn = document.getElementById('togglePwBtn');
    input.type = pwVisible ? 'text' : 'password';
    btn.classList.toggle('active', pwVisible);
    btn.setAttribute('aria-label', pwVisible ? '비밀번호 숨기기' : '비밀번호 보기');
    btn.innerHTML = pwVisible
      ? `<svg id="eyeIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"/><path d="M10.6 10.6A2.7 2.7 0 0 0 13.4 13.4"/><path d="M7.5 7.7C4 9.3 2 12 2 12s3.5 6 10 6c1.7 0 3.2-.4 4.4-1"/><path d="M20.2 14.4C21.4 13.1 22 12 22 12s-3.5-6-10-6c-.9 0-1.8.1-2.6.3"/></svg>`
      : `<svg id="eyeIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="2.7"/></svg>`;
  }

  function submitLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if (!u || !p) { showNotice('아이디와 비밀번호를 모두 입력해주세요.'); return; }
    const btn = document.querySelector('.signup-btn');
    btn.disabled = true;
    btn.textContent = '로그인 중...';
    fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u, password: p})
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) { window.location.href = '/'; }
      else { showNotice(data.error || '로그인에 실패했습니다.'); }
    })
    .catch(() => { showNotice('로그인 중 오류가 발생했습니다.'); })
    .finally(() => { btn.disabled = false; btn.textContent = '로그인'; });
  }
</script>
</body>
</html>
