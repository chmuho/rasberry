<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>비밀번호 재설정 | 스마트 도어락</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { min-height: 100vh; font-family: 'Noto Sans KR', sans-serif; background: #ffffff; color: #111111; }
    .page { width: min(430px, 100%); margin: 0 auto; padding: 42px 28px 48px; min-height: 100vh; }
    .back-btn { border: none; background: #f3f3f3; width: 38px; height: 38px; border-radius: 12px; font-size: 22px; cursor: pointer; margin-bottom: 28px; }
    .title { font-size: 30px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
    .desc { font-size: 14px; color: #777; line-height: 1.6; margin-bottom: 30px; }
    .form { display: flex; flex-direction: column; gap: 18px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 14px; font-weight: 600; }
    .input-wrap input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 14px; padding: 16px 18px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; color: #111; outline: none; }
    .input-wrap input:focus { border-color: #111; }
    .submit-btn { width: 100%; background: #111; color: #fff; border: none; border-radius: 50px; padding: 18px; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .submit-btn:disabled { opacity: 0.65; cursor: default; }
    .notice { display: none; margin-top: 18px; padding: 14px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .notice.info { display: block; background: #F0F7FF; color: #245C8F; border: 1px solid #D9EAFB; }
    .notice.error { display: block; background: #FFF1F1; color: #B34040; border: 1px solid #F5D0D0; }
  </style>
</head>
<body>
<div class="page">
  <button class="back-btn" type="button" onclick="window.location.href='/forgot-password'" aria-label="뒤로">‹</button>
  <h1 class="title">비밀번호 재설정</h1>
  <p class="desc">본인 확인이 완료되었습니다. 새 비밀번호를 설정해주세요.</p>

  <div class="form">
    <div class="field">
      <label for="resetPassword">새 비밀번호</label>
      <div class="input-wrap"><input type="password" id="resetPassword" placeholder="8자 이상 입력하세요" /></div>
    </div>
    <div class="field">
      <label for="resetPasswordConfirm">새 비밀번호 확인</label>
      <div class="input-wrap"><input type="password" id="resetPasswordConfirm" placeholder="새 비밀번호를 다시 입력하세요" /></div>
    </div>
    <button class="submit-btn" id="resetBtn" type="button" onclick="submitPasswordReset()">비밀번호 재설정</button>
  </div>
  <div id="notice" class="notice"></div>
</div>

<script>
  function showNotice(message, type = 'info') {
    const notice = document.getElementById('notice');
    notice.textContent = message;
    notice.className = `notice ${type}`;
  }

  async function submitPasswordReset() {
    const newPassword = document.getElementById('resetPassword').value.trim();
    const confirmPassword = document.getElementById('resetPasswordConfirm').value.trim();
    if (!newPassword || !confirmPassword) {
      showNotice('새 비밀번호와 확인 비밀번호를 모두 입력해주세요.', 'error');
      return;
    }
    if (newPassword !== confirmPassword) {
      showNotice('새 비밀번호 확인이 일치하지 않습니다.', 'error');
      return;
    }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = '재설정 중...';
    try {
      const res = await fetch('/api/password/reset', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({new_password: newPassword, confirm_password: confirmPassword})
      });
      const data = await res.json();
      if (!res.ok || !data.success) {
        showNotice(data.error || '비밀번호 재설정에 실패했습니다.', 'error');
        return;
      }
      showNotice('비밀번호가 재설정되었습니다. 로그인 화면으로 이동합니다.');
      setTimeout(() => { window.location.href = '/login'; }, 900);
    } catch(e) {
      showNotice('비밀번호 재설정 중 오류가 발생했습니다.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '비밀번호 재설정';
    }
  }
</script>
</body>
</html>
